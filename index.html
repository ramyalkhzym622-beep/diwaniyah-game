<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جيم ألقاب الديوانية لايف 🎮</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #0b0f19; color: #f3f4f6; padding: 15px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { max-width: 650px; width: 100%; background: #111827; padding: 25px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.6); border: 1px solid #1f2937; text-align: center; margin-top: 15px; }
        h1 { color: #38bdf8; font-size: 24px; margin-bottom: 15px; }
        input, select { width: 100%; padding: 12px; background: #1f2937; border: 1px solid #374151; border-radius: 10px; color: white; text-align: center; font-size: 16px; margin-bottom: 15px; }
        button { width: 100%; padding: 14px; background: linear-gradient(135deg, #06b6d4, #0891b2); border: none; border-radius: 10px; color: white; font-weight: bold; font-size: 16px; cursor: pointer; }
        .hidden { display: none !important; }
        .card-grid { display: grid; grid-template-columns: 1fr; gap: 15px; margin-top: 20px; }
        @media(min-width: 480px) { .card-grid { grid-template-columns: 1fr 1fr; } }
        .nickname-card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 15px; text-align: right; }
        .card-title { color: #f59e0b; font-weight: bold; font-size: 18px; margin-bottom: 10px; text-align: center; background: rgba(245, 158, 11, 0.1); padding: 6px; border-radius: 6px; }
    </style>
    <!-- استدعاء سيرفر المزامنة اللحظية أونلاين -->
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
</head>
<body>

    <h1>🎮 جيم ألقاب الديوانية الأونلاين 🎮</h1>

    <!-- شاشة الدخول -->
    <div id="loginScreen" class="container">
        <h2>ادخل الجيم الأونلاين الحين</h2>
        <br>
        <input type="text" id="pName" placeholder="اسمك الحقيقي...">
        <input type="text" id="pNick" placeholder="لقبك السري المجهول...">
        <button onclick="connectToLiveServer()">دخول السيرفر والربط لايف 🚀</button>
    </div>

    <!-- ساحة اللعب الأونلاين -->
    <div id="gameScreen" class="container hidden">
        <p style="color: #10b981; font-size: 14px;">🟢 متصل بالسيرفر الأونلاين لايف!</p>
        <div id="nicknamesGrid" class="card-grid"></div>
    </div>

    <script>
        let peer;
        let myName, myNick;

        function connectToLiveServer() {
            myName = document.getElementById('pName').value.trim();
            myNick = document.getElementById('pNick').value.trim();
            if(!myName || !myNick) { alert("اكتب اسمك ولقبك أول!"); return; }

            // ربط الجهاز بسيرفر النت لايف أوتوماتيك بدون كود يدوي
            peer = new Peer('diwaniyah-' + Math.random().toString(36).substr(2, 4));
            
            peer.on('open', function(id) {
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('gameScreen').classList.remove('hidden');
                alert("دخلت السيرفر! الحين أي أحد يفتح الموقع يبي يشوفك لايف ويصوت عليك وتصوت عليه فوراً بالنت!");
                // هنا يبدأ السيرفر يستقبل ويرسل البيانات بالنت لكل الجوالات أوتوماتيك
            });
        }
    </script>
</body>
</html>
